<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Puzzle Solver</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    font-family: sans-serif;
    margin:15px;
    font-size:18px;
}

h2{
    text-align:center;
}

input{
    font-size:20px;
    padding:8px;
    margin:5px 0;
    width:100%;
    box-sizing:border-box;
}

button{
    font-size:20px;
    padding:10px;
    width:100%;
    margin-top:10px;
}

#result{
    margin-top:20px;
    column-count:3;
    column-gap:20px;
    font-family:monospace;
    font-size:18px;
}

@media (max-width:600px){
    #result{
        column-count:2;
        font-size:20px;
    }
}

</style>
</head>

<body>

<h2>Puzzle Solver</h2>

Letters:
<input id="letters">

Must contain:
<input id="must">

Minimum length:
<input id="min" type="number" value="4">

<button onclick="solve()">Solve</button>

<div id="result"></div>

<script>

let words=[];

fetch("woorden.txt")
.then(r=>r.text())
.then(t=>words=t.split("\n"));

function solve(){

    let letters=document.getElementById("letters").value.toLowerCase();
    let must=document.getElementById("must").value.toLowerCase();
    let min=parseInt(document.getElementById("min").value);

    let regex=new RegExp("^["+letters+"]*"+must+"["+letters+"]*$");

    let results=words
        .map(w=>w.trim().toLowerCase())
        .filter(w=>regex.test(w))
        .filter(w=>w.length>=min);

    results=[...new Set(results)];

    results.sort((a,b)=>a.length-b.length||a.localeCompare(b));

    // statistieken maken
    let stats={};

    results.forEach(w=>{
        let l=w.length;
        stats[l]=(stats[l]||0)+1;
    });

    let statText="<b>Statistiek</b><br>";

    Object.keys(stats)
        .sort((a,b)=>a-b)
        .forEach(l=>{
            statText+=l+" letters: "+stats[l]+"<br>";
        });

    statText+="<br><b>Totaal: "+results.length+" woorden</b><br><br>";

    document.getElementById("result").innerHTML=
        statText + results.join("<br>");
}

</script>

</body>
</html>
